<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.jpeg" type="image/x-icon" />
    <title>Mojtaba's Projects</title>

    <!-- Styles -->
    <link rel="stylesheet" href="styles/styles.css" />
    <script type="text/javascript" src="styles/tailwind_3.4.3.js"></script>

    <!-- JavaScripts -->
    <script type="text/javascript" src="js/main.js"></script>
  </head>
  <body class="flex flex-row main-container">
    <!-- The left selection part -->
    <section class="flex flex-col w-1/5 m-4 proj-list-container">
      <h1>My Projects</h1>
      <div class="underline"></div>
    </section>

    <!-- The selected project's info -->
    <section
      id="selected-project-container"
      class="w-3/4 m-4 flex flex-col items-center"
    >
      <!-- Title section -->
      <span class="flex flex-row items-center">
        <h1 id="main-title"></h1>
        <a id="main-link" class="github-btn" href="">GitHub</a>
      </span>
      <!-- Video/Image -->
      <img
        id="main-video"
        class="media w-11/12 h-4/6"
        src="./assets/teamerinoAngular/img1.png"
        allowfullscreen
      />
      <!-- Description -->
      <p id="main-descr"></p>
    </section>
  </body>
</html>
