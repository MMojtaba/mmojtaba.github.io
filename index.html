<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.jpeg" type="image/x-icon" />
    <title>Mojtaba's Projects</title>

    <!-- Styles -->
    <link rel="stylesheet" href="styles/styles.css" />

    <!-- JavaScripts -->
    <script type="text/javascript" src="js/main.js"></script>
  </head>
  <body class="main-container">
    <!-- The left selection part -->
    <section class="proj-list-container">
      <h1>My Projects</h1>
      <div class="underline"></div>
      <a class="a-btn" style="margin-top: 1rem" href="games">View Games</a>
    </section>

    <!-- The selected project's info -->
    <section id="selected-project-container">
      <!-- Title section -->
      <span class="proj-title-container">
        <h1 id="main-title"></h1>
        <a id="main-link" class="github-btn" href="">GitHub</a>
      </span>
      <!-- Video/Image -->
      <img
        id="main-video"
        class="media"
        src="./assets/teamerinoAngular/img1.jpeg"
        allowfullscreen
      />
      <!-- Description -->
      <p id="main-descr"></p>
    </section>
  </body>
</html>
